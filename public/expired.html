<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>访问已过期 — VocabCloud</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:white;border-radius:16px;padding:3rem 2.5rem;text-align:center;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.1)}
.icon{width:72px;height:72px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 1.5rem}
h2{font-size:22px;font-weight:700;color:#111827;margin-bottom:8px}
p{font-size:14px;color:#6b7280;line-height:1.7;max-width:300px;margin:0 auto 1.5rem}
.info-box{background:#fee2e2;border-radius:10px;padding:12px 16px;font-size:12px;color:#dc2626;font-family:monospace}
.footer{margin-top:1.5rem;font-size:12px;color:#9ca3af}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔒</div>
  <h2>访问链接已过期</h2>
  <p>此学习资料的使用期限已结束，请联系您的老师获取新的访问权限。</p>
  <div class="info-box">链接：<span id="urlShow"></span></div>
  <p class="footer" style="margin-top:1rem">如有疑问，请联系授课老师处理</p>
</div>
<script>document.getElementById('urlShow').textContent = location.href;</script>
</body>
</html>
